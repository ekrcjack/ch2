<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>N5 必背單字・常用漢字</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;600;700&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --accent:#c0392b; --accent2:#8e44ad;
  --paper:#fbf7f0; --card:#ffffff; --ink:#2b2320; --sub:#6f635b;
  --line:#e7ddcf; --chip:#f1e9dc; --ok:#1e8449; --shadow:0 2px 8px rgba(80,50,30,.08);
}
*{box-sizing:border-box}
html,body{margin:0}
body{
  background:var(--paper); color:var(--ink);
  font-family:"Noto Sans TC",-apple-system,"PingFang TC","Microsoft JhengHei",sans-serif;
  line-height:1.6; -webkit-text-size-adjust:100%;
}
.jp{font-family:"Noto Serif JP","Hiragino Mincho ProN",serif;}
header.top{
  position:sticky; top:0; z-index:30; background:rgba(251,247,240,.96);
  backdrop-filter:blur(6px); border-bottom:1px solid var(--line);
}
.top-in{max-width:1080px;margin:0 auto;padding:12px 16px 0}
.top h1{font-size:1.15rem;margin:0 0 2px;font-weight:700}
.top p{margin:0;color:var(--sub);font-size:.82rem}
.title-row{display:flex;align-items:center;justify-content:space-between;gap:14px;flex-wrap:wrap}
.tabs{display:flex;gap:8px;margin-top:10px}
.tab{
  appearance:none;border:1px solid var(--line);background:var(--card);color:var(--sub);
  padding:8px 16px;border-radius:10px 10px 0 0;font-size:.95rem;font-weight:600;cursor:pointer;
  border-bottom:none;transition:.15s;
}
.tab.active{color:#fff;background:var(--accent);border-color:var(--accent)}
.toolbar{display:flex;gap:10px;align-items:center;flex:0 0 auto;min-width:0}
.search{flex:0 1 110px;min-width:70px;display:flex;align-items:center;gap:8px;background:var(--card);
  border:1px solid var(--line);border-radius:10px;padding:8px 12px}
.search input{border:none;outline:none;background:none;flex:1;font-size:.95rem;color:var(--ink)}
.btn-stop{appearance:none;border:1px solid var(--line);background:var(--card);color:var(--sub);
  width:38px;height:38px;padding:0;border-radius:10px;font-weight:600;cursor:pointer;
  display:inline-flex;align-items:center;justify-content:center;flex:none}
.btn-stop:hover{border-color:var(--accent);color:var(--accent)}
.chipnav{max-width:1080px;margin:0 auto;padding:0 16px 6px;display:flex;gap:6px;overflow-x:auto;-webkit-overflow-scrolling:touch}
.chipnav a{white-space:nowrap;text-decoration:none;font-size:.8rem;color:var(--sub);
  background:var(--chip);border:1px solid var(--line);padding:5px 11px;border-radius:999px}
.chipnav a:hover{color:var(--accent);border-color:var(--accent)}
main{max-width:1080px;margin:0 auto;padding:8px 16px 80px}
.cat{margin:26px 0 8px}
.cat-h{display:flex;align-items:center;gap:12px;flex-wrap:wrap;
  border-bottom:2px solid var(--accent);padding-bottom:8px;margin-bottom:14px}
.cat-h h2{font-size:1.15rem;margin:0;font-weight:700}
.cat-h .cnt{color:var(--sub);font-size:.8rem;font-weight:500}
.play-all{appearance:none;cursor:pointer;margin-left:auto;border:1px solid var(--accent);
  color:var(--accent);background:transparent;border-radius:999px;padding:6px 14px;font-weight:600;font-size:.85rem;
  display:inline-flex;align-items:center;gap:6px;transition:.15s}
.play-all:hover{background:var(--accent);color:#fff}
.play-all.playing{background:var(--accent);color:#fff}
.play-all.playing .ico::before{content:"■"}
.play-all .ico::before{content:"▶"}
.subhead{font-size:.9rem;font-weight:700;color:var(--accent2);margin:16px 0 8px;
  display:flex;align-items:center;gap:8px}
.subhead::before{content:"";width:6px;height:6px;border-radius:50%;background:var(--accent2)}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(255px,1fr));gap:12px}
.card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:13px 14px;
  box-shadow:var(--shadow);display:flex;flex-direction:column;gap:8px}
.card-top{display:flex;align-items:baseline;gap:9px;flex-wrap:wrap}
.word{font-size:1.5rem;font-weight:700;line-height:1.2;cursor:pointer;border:none;background:none;
  color:var(--ink);padding:0;font-family:"Noto Serif JP",serif;text-align:left}
.word:hover{color:var(--accent)}
.word::after{content:"🔊";font-size:.7rem;margin-left:5px;opacity:.4;vertical-align:middle}
.word:hover::after{opacity:.9}
.word.playing{color:var(--accent);text-decoration:underline}
.kana{color:var(--sub);font-size:.9rem}
.romaji{color:#b7a99a;font-size:.76rem;font-style:italic}
.mean{color:var(--ink);font-size:.92rem}
.mean b{color:var(--accent);font-weight:600}
.ex{margin-top:2px;padding:9px 11px;background:var(--paper);border-radius:10px;border:1px solid var(--line)}
.ex-line{display:flex;align-items:flex-start;gap:8px}
.ex-ja{flex:1;font-family:"Noto Serif JP",serif;font-size:1.02rem;font-weight:600}
.ex-kana{color:var(--sub);font-size:.82rem;margin-top:2px}
.ex-zh{color:var(--sub);font-size:.85rem;margin-top:1px}
.say{appearance:none;flex:none;cursor:pointer;width:30px;height:30px;border-radius:50%;
  border:1px solid var(--accent);color:var(--accent);background:#fff;font-size:.8rem;line-height:1;
  display:inline-flex;align-items:center;justify-content:center;transition:.15s}
.say:hover{background:var(--accent);color:#fff}
.say.playing{background:var(--accent);color:#fff;animation:pulse 1s infinite}
.say::before{content:"▶"}
.say.playing::before{content:"■"}
@keyframes pulse{50%{opacity:.55}}
/* ch3 */
.k-onkun{display:flex;gap:14px;flex-wrap:wrap;font-size:.86rem;color:var(--sub)}
.k-onkun b{color:var(--ink);font-weight:600;margin-right:3px}
.k-rei{font-family:"Noto Serif JP",serif;font-size:.95rem;color:var(--ink)}
.k-rei-line{font-size:.84rem;color:var(--sub);font-family:"Noto Serif JP",serif}
.k-rei-line .rei-lbl{display:inline-block;font-family:"Noto Sans TC",sans-serif;font-size:.7rem;
  color:var(--accent2);border:1px solid var(--accent2);border-radius:5px;padding:0 5px;margin-right:6px;vertical-align:middle}
.hidden{display:none !important}
.empty-note{color:var(--sub);text-align:center;padding:30px}
footer{max-width:1080px;margin:0 auto;padding:16px;color:var(--sub);font-size:.78rem;border-top:1px solid var(--line)}
@media (max-width:520px){
  .word{font-size:1.35rem}
  .grid{grid-template-columns:1fr}
  .top h1{font-size:1.02rem}
}
@media (prefers-reduced-motion:reduce){.say.playing{animation:none}}
</style>
</head>
<body>
<header class="top">
  <div class="top-in">
    <div class="title-row">
      <h1>N5 單字漢字 <span style="font-weight:400;color:var(--sub);font-size:.85rem">發音練習</span></h1>
      <div class="toolbar">
        <label class="search">
          <span aria-hidden="true">🔍</span>
          <input id="q" type="search" placeholder="搜尋" autocomplete="off">
        </label>
        <button class="btn-stop" id="stopBtn" aria-label="停止播放" title="停止播放">■</button>
      </div>
    </div>
    <div class="tabs">
      <button class="tab active" data-ch="ch2">必背單字</button>
      <button class="tab" data-ch="ch3">常用漢字</button>
    </div>
  </div>
  <nav class="chipnav" id="chipnav"></nav>
</header>

<main id="main"></main>

<footer>
  <p id="voiceNote"></p>
  <p>發音使用瀏覽器語音合成（Web Speech API，ja-JP）。若無日文語音，請於作業系統或瀏覽器安裝日語語音包；行動裝置需點擊後才會發聲。</p>
</footer>

/* ---------------- render ---------------- */
const main = document.getElementById('main');
const chipnav = document.getElementById('chipnav');
const esc = s => (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
let current = 'ch2';

function meanHTML(m){ return esc(m).replace(/（([^）]*)）/g,'<span style="color:var(--sub);font-size:.85em">（$1）</span>'); }

function cardCH2(it){
  const romaji = it.r ? `<span class="romaji">${esc(it.r)}</span>` : '';
  return `<div class="card" data-s="${esc((it.w+it.k+it.r+it.m+it.ex).toLowerCase())}">
    <div class="card-top">
      <button class="word jp" data-text="${esc(it.k||it.w)}" title="點擊發音">${esc(it.w)}</button>
      <span class="kana jp">${esc(it.k)}</span>${romaji}
    </div>
    <div class="mean">${meanHTML(it.m)}</div>
    <div class="ex">
      <div class="ex-line">
        <div class="ex-ja jp">${esc(it.ex)}</div>
        <button class="say ex" data-text="${esc(it.ex)}" title="播放例句"></button>
      </div>
      <div class="ex-kana jp">${esc(it.exk)}</div>
      <div class="ex-zh">${esc(it.exm)}</div>
    </div>
  </div>`;
}
function cardCH3(it){
  const firstTerm = (it.say||'').split('、')[0] || it.w;
  return `<div class="card" data-s="${esc((it.w+it.on+it.kun+it.rei+it.ex).toLowerCase())}">
    <div class="card-top">
      <button class="word jp" data-text="${esc(firstTerm)}" title="點擊發音">${esc(it.w)}</button>
    </div>
    <div class="k-onkun">
      <span><b>音</b>${esc(it.on)||'—'}</span>
      <span><b>訓</b>${esc(it.kun)||'—'}</span>
    </div>
    <div class="k-rei-line"><span class="rei-lbl">例詞</span>${esc(it.rei)}</div>
    <div class="ex">
      <div class="ex-line">
        <div class="ex-ja jp">${esc(it.ex)}</div>
        <button class="say ex" data-text="${esc(it.ex)}" title="播放例句"></button>
      </div>
      <div class="ex-kana jp">${esc(it.exk)}</div>
      <div class="ex-zh">${esc(it.exm)}</div>
    </div>
  </div>`;
}

function render(ch){
  current = ch;
  const cats = DATA[ch];
  let html = '', chips = '';
  cats.forEach((c,ci)=>{
    const id = ch+'-'+ci;
    const short = c.title.replace(/（[^）]*）/,'');
    chips += `<a href="#${id}">${esc(short)}</a>`;
    const count = ch==='ch2'
      ? c.groups.reduce((n,g)=>n+g.items.length,0)
      : c.items.length;
    html += `<section class="cat" id="${id}">
      <div class="cat-h">
        <h2 class="jp">${esc(c.title)}</h2>
        <span class="cnt">${count} 項</span>
        <button class="play-all"><span class="ico"></span> 全部播放</button>
      </div>`;
    if(ch==='ch2'){
      c.groups.forEach(g=>{
        if(g.sub) html += `<div class="subhead">${esc(g.sub)}</div>`;
        html += '<div class="grid">' + g.items.map(cardCH2).join('') + '</div>';
      });
    }else{
      html += '<div class="grid">' + c.items.map(cardCH3).join('') + '</div>';
    }
    html += '</section>';
  });
  main.innerHTML = html;
  chipnav.innerHTML = chips;
  applyFilter(document.getElementById('q').value);
}

/* tabs */
document.querySelectorAll('.tab').forEach(t=>{
  t.addEventListener('click',()=>{
    document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
    t.classList.add('active');
    stopAll();
    render(t.dataset.ch);
    window.scrollTo({top:0});
  });
});

/* search filter */
const q = document.getElementById('q');
function applyFilter(v){
  v = (v||'').trim().toLowerCase();
  document.querySelectorAll('#main .card').forEach(card=>{
    card.classList.toggle('hidden', v && !card.dataset.s.includes(v));
  });
  document.querySelectorAll('#main .cat').forEach(sec=>{
    const any = sec.querySelector('.card:not(.hidden)');
    sec.classList.toggle('hidden', !any);
  });
}
q.addEventListener('input', e=>applyFilter(e.target.value));

/* ---------------- speech ---------------- */
const supported = 'speechSynthesis' in window;
let jaVoice = null;
function pickVoice(){
  const vs = speechSynthesis.getVoices();
  jaVoice = vs.find(v=>/ja(-|_)?/i.test(v.lang)) || vs.find(v=>/japanese/i.test(v.name)) || null;
  const note = document.getElementById('voiceNote');
  if(!supported){ note.textContent='⚠ 此瀏覽器不支援語音合成，發音按鈕已停用。'; }
  else if(jaVoice){ note.textContent='🔊 目前日語語音：'+jaVoice.name; }
  else { note.textContent='🔊 語音已就緒（未偵測到專用日語語音，將使用預設語音）。'; }
}
if(supported){ pickVoice(); speechSynthesis.onvoiceschanged = pickVoice; }

let runId = 0;
function stopAll(){
  runId++;
  if(supported) speechSynthesis.cancel();
  document.querySelectorAll('.say.playing, .word.playing, .play-all.playing').forEach(b=>b.classList.remove('playing'));
}
function makeUtter(text){
  const u = new SpeechSynthesisUtterance(text);
  u.lang='ja-JP'; u.rate=0.9;
  if(!jaVoice) pickVoice();
  if(jaVoice) u.voice = jaVoice;
  return u;
}
function speakOne(btn){
  const text = btn.dataset.text||'';
  stopAll();
  if(!text || !supported) return;
  const my = runId;
  btn.classList.add('playing');
  const u = makeUtter(text);
  u.onend = u.onerror = ()=>{ if(my===runId) btn.classList.remove('playing'); };
  speechSynthesis.speak(u);
}
function speakSection(btn){
  const was = btn.classList.contains('playing');
  stopAll();
  if(was || !supported) return;
  const sec = btn.closest('.cat');
  const items = [...sec.querySelectorAll('.card:not(.hidden) .say.ex')].map(b=>b.dataset.text).filter(Boolean);
  if(!items.length) return;
  const my = runId;
  btn.classList.add('playing');
  let i=0;
  (function next(){
    if(my!==runId) return;
    if(i>=items.length){ btn.classList.remove('playing'); return; }
    const u = makeUtter(items[i++]);
    u.onend = next;
    u.onerror = ()=>{ if(my===runId) btn.classList.remove('playing'); };
    speechSynthesis.speak(u);
  })();
}
document.addEventListener('click', e=>{
  const pa = e.target.closest('.play-all');
  if(pa){ speakSection(pa); return; }
  const s = e.target.closest('.say, .word');
  if(s){ speakOne(s); return; }
});
document.getElementById('stopBtn').addEventListener('click', stopAll);

/* init */
render('ch2');
</script>
